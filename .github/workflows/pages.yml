name: GitHub Pages デプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GitHub Pages 設定
        uses: actions/configure-pages@v5

      - name: アーティファクトアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
